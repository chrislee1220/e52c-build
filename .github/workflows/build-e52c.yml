name: Build ImmortalWrt E52C Unlocked

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 释放磁盘空间
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          swap-size-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          build-mount-path: '/mnt/build'

      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
             python3-setuptools rsync swig unzip zlib1g-dev file wget zstd \
      python3-pyelftools

      - name: 拉取 ImmortalWrt 源码
        run: |
          cd /mnt/build
          git clone -b openwrt-25.12 --depth=1 https://github.com/immortalwrt/immortalwrt.git immortalwrt

      - name: 更新 feeds
        run: |
          cd /mnt/build/immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 生成设备配置
        run: |
          cd /mnt/build/immortalwrt
          cat > .config << 'EOF'
          CONFIG_TARGET_rockchip=y
          CONFIG_TARGET_rockchip_armv8=y
          CONFIG_TARGET_rockchip_armv8_DEVICE_radxa_e52c=y
          EOF
          make defconfig

      - name: 提取 u-boot 源码（先下载并展开，暂不编译）
        run: |
          cd /mnt/build/immortalwrt
          make package/boot/uboot-rockchip/download V=s
          make package/boot/uboot-rockchip/prepare V=s

      - name: 开核 - 移除核心屏蔽配置
        run: |
          cd /mnt/build/immortalwrt
          DEFCONF=$(find build_dir -path "*/configs/radxa-e52c-rk3582_defconfig")
          echo "找到文件: $DEFCONF"
          test -n "$DEFCONF"
          sed -i '/CONFIG_OF_SYSTEM_SETUP=y/d' "$DEFCONF"
          echo "----- 修改后内容确认 -----"
          grep -c OF_SYSTEM_SETUP "$DEFCONF" || echo "已确认移除该配置行"

      - name: 编译 u-boot
        run: |
          cd /mnt/build/immortalwrt
          make package/boot/uboot-rockchip/compile V=s -j$(nproc)

      - name: 编译完整固件
        run: |
          cd /mnt/build/immortalwrt
          make -j$(nproc) V=s || make -j1 V=s

      - name: 收集产物
        run: |
          mkdir -p /mnt/build/output
          cp /mnt/build/immortalwrt/bin/targets/rockchip/armv8/*e52c*sysupgrade* /mnt/build/output/ 2>/dev/null || true
          cp /mnt/build/immortalwrt/bin/targets/rockchip/armv8/sha256sums /mnt/build/output/ 2>/dev/null || true

      - name: 上传固件到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-e52c-unlocked
          path: /mnt/build/output/
          retention-days: 14
