name: Build ImmortalWrt E52C Unlocked

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 释放磁盘空间
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          swap-size-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          build-mount-path: '/mnt/build'

      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget zstd \
            python3-pyelftools python3-pip

      - name: 拉取 ImmortalWrt 源码
        run: |
          cd /mnt/build
          git clone -b openwrt-25.12 --depth=1 https://github.com/immortalwrt/immortalwrt.git immortalwrt

      - name: 开核 - 写入 u-boot 补丁文件（固定内容，无需提前提取源码）
        run: |
          cd /mnt/build/immortalwrt
          mkdir -p package/boot/uboot-rockchip/patches
          cat > package/boot/uboot-rockchip/patches/999-e52c-unlock-cores.patch << 'PATCH_EOF'
          --- a/configs/generic-rk3588_defconfig
          +++ b/configs/generic-rk3588_defconfig
          @@ -16,7 +16,6 @@
           CONFIG_SPL_LOAD_FIT=y
           # CONFIG_BOOTMETH_VBE is not set
           CONFIG_LEGACY_IMAGE_FORMAT=y
          -CONFIG_OF_SYSTEM_SETUP=y
           CONFIG_DEFAULT_FDT_FILE="rockchip/rk3588-generic.dtb"
           # CONFIG_DISPLAY_CPUINFO is not set
           CONFIG_SPL_MAX_SIZE=0x40000
          PATCH_EOF
          echo "补丁文件已写入:"
          cat package/boot/uboot-rockchip/patches/999-e52c-unlock-cores.patch

      - name: 更新 feeds
        run: |
          cd /mnt/build/immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 生成设备配置
        run: |
          cd /mnt/build/immortalwrt
          cat > .config << 'EOF'
          CONFIG_TARGET_rockchip=y
          CONFIG_TARGET_rockchip_armv8=y
          CONFIG_TARGET_rockchip_armv8_DEVICE_radxa_e52c=y
          EOF
          make defconfig

      - name: 完整编译（补丁会在u-boot源码准备阶段由构建系统自动应用）
        run: |
          cd /mnt/build/immortalwrt
          make -j$(nproc) V=s

      - name: 收集产物
        run: |
          mkdir -p /mnt/build/output
          cp /mnt/build/immortalwrt/bin/targets/rockchip/armv8/*e52c*sysupgrade* /mnt/build/output/ 2>/dev/null || true
          cp /mnt/build/immortalwrt/bin/targets/rockchip/armv8/sha256sums /mnt/build/output/ 2>/dev/null || true

      - name: 上传固件到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-e52c-unlocked
          path: /mnt/build/output/
          retention-days: 14
