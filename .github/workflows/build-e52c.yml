name: Build ImmortalWrt E52C Unlocked v2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 释放磁盘空间
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          swap-size-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          build-mount-path: '/mnt/build'

      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget zstd \
          python3-pyelftools python3-pip

      # 注意：改用具体的正式版 tag（而不是滚动维护分支 openwrt-25.12），
      # 编译出来的固件版本号才会是正式版号，而不是 SNAPSHOT + commit 哈希。
      # 当前最新正式版 tag 为 v25.12.1（已在 Firmware Selector 和 GitHub Tags 核实一致）。
      - name: 拉取 ImmortalWrt 源码（正式版 tag）
        run: |
          cd /mnt/build
          git clone -b v25.12.1 --depth=1 https://github.com/immortalwrt/immortalwrt.git

      - name: 开核 - 写入 u-boot 补丁文件（固定内容，无需提前提取源码）
        run: |
          cd /mnt/build/immortalwrt
          mkdir -p package/boot/uboot-rockchip/patches
          cat > package/boot/uboot-rockchip/patches/999-e52c-unlock-cores.patch << 'PATCH_EOF'
          --- a/configs/generic-rk3588_defconfig
          +++ b/configs/generic-rk3588_defconfig
          @@ -16,7 +16,6 @@
           CONFIG_SPL_LOAD_FIT=y
           # CONFIG_BOOTMETH_VBE is not set
           CONFIG_LEGACY_IMAGE_FORMAT=y
          -CONFIG_OF_SYSTEM_SETUP=y
           CONFIG_DEFAULT_FDT_FILE="rockchip/rk3588-generic.dtb"
           # CONFIG_DISPLAY_CPUINFO is not set
           CONFIG_SPL_MAX_SIZE=0x40000
          PATCH_EOF
          echo "补丁文件已写入:"
          cat package/boot/uboot-rockchip/patches/999-e52c-unlock-cores.patch

      - name: 更新 feeds
        run: |
          cd /mnt/build/immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 生成设备配置
        run: |
          cd /mnt/build/immortalwrt
          cat > .config << 'EOF'
          CONFIG_TARGET_rockchip=y
          CONFIG_TARGET_rockchip_armv8=y
          CONFIG_TARGET_rockchip_armv8_DEVICE_radxa_e52c=y

          # ---- HomeProxy / sing-box 核心与依赖 ----
          CONFIG_PACKAGE_sing-box=y
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_luci-i18n-homeproxy-zh-cn=y
          CONFIG_PACKAGE_firewall4=y
          CONFIG_PACKAGE_kmod-nft-tproxy=y
          CONFIG_PACKAGE_ucode-mod-digest=y

          # ---- TUN 模式必需 ----
          CONFIG_PACKAGE_kmod-tun=y
          CONFIG_PACKAGE_ip-full=y

          # ---- 连接状态/分流相关内核模块（原配置已有，保留） ----
          CONFIG_PACKAGE_kmod-inet-diag=y
          CONFIG_PACKAGE_kmod-netlink-diag=y
          CONFIG_PACKAGE_kmod-nft-fullcone=y

          # ---- HTTPS / 规则集下载 / opkg-apk 在线安装 ----
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_ca-certificates=y
          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_libustream-mbedtls=y
          CONFIG_PACKAGE_zlib=y
          CONFIG_PACKAGE_libpcre2=y
          CONFIG_PACKAGE_curl=y

          # ---- 远程管理（SFTP / 终端）----
          CONFIG_PACKAGE_openssh-sftp-server=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn=y

          # ---- Web 界面体验（主题 / 中文 / 文件管理）----
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-app-argon-config=y
          CONFIG_PACKAGE_luci-i18n-argon-config-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-package-manager-zh-cn=y
          CONFIG_PACKAGE_luci-app-filebrowser=y

          # ---- 外接存储（如有 U 盘/硬盘需求，用不到可删）----
          CONFIG_PACKAGE_kmod-usb-storage=y
          CONFIG_PACKAGE_block-mount=y
          CONFIG_PACKAGE_luci-app-diskman=y
          EOF
          make defconfig

      - name: 完整编译（补丁会在u-boot源码准备阶段由构建系统自动应用）
        run: |
          cd /mnt/build/immortalwrt
          make -j$(nproc) V=s

      - name: 收集产物
        run: |
          mkdir -p /mnt/build/output
          cp /mnt/build/immortalwrt/bin/targets/rockchip/armv8/*e52c*sysupgrade* /mnt/build/output/
          cp /mnt/build/immortalwrt/bin/targets/rockchip/armv8/sha256sums /mnt/build/output/

      - name: 上传固件到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-e52c-unlocked-v2
          path: /mnt/build/output/
